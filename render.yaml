services:
  - type: web
    name: expenseaudit-backend
    runtime: python
    rootDir: backend
    buildCommand: apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
